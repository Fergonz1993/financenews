name: ✨ Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve Financial News? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered?
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (FastAPI / Python)
        - Frontend (Next.js / React)
        - New Data Source / Connector
        - Sentiment Analysis / NLP
        - Analytics / Dashboard
        - API
        - DevOps / CI / Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: willing
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes — I'd like to submit a PR"
        - "Maybe — I'd need guidance"
        - "No — just suggesting"
    validations:
      required: false
