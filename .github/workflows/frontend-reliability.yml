name: Frontend Reliability

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-reliability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-and-visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.2'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Run smoke suite
        env:
          FRONTEND_HOST: 127.0.0.1
          FRONTEND_PORT: 3100
          ENABLE_LOCAL_API_FALLBACK: true
        run: bun run smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-reliability-artifacts
          if-no-files-found: warn
          path: |
            .tmp/smoke/**
            output/playwright/smoke/**
