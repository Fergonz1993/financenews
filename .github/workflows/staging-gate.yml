name: Staging Release Gate

on:
  workflow_dispatch:
    inputs:
      run_smoke:
        description: "Run frontend smoke suite as part of gate"
        required: false
        default: false
        type: boolean

jobs:
  staging-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: financenews_staging
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run staging release gate
        env:
          STAGING_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/financenews_staging
        run: |
          SMOKE_FLAG=""
          if [[ "${{ inputs.run_smoke }}" == "true" ]]; then
            SMOKE_FLAG="--run-smoke"
          fi
          python scripts/ops/staging_release_gate.py \
            --database-url "$STAGING_DATABASE_URL" \
            --output-json output/ops/staging-gate-report.json \
            $SMOKE_FLAG

      - name: Upload staging gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-gate-artifacts
          if-no-files-found: warn
          path: |
            output/ops/staging-gate-report.json
            output/quality/**
            .tmp/smoke/**
