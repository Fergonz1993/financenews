name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-ratchet:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Sync Python environment
        run: uv sync --frozen --all-extras --dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Collect quality checkpoint
        run: |
          uv run python scripts/quality_checkpoint.py collect \
            --output-json output/quality/current.json \
            --output-md output/quality/current.md

      - name: Enforce quality ratchet
        run: |
          uv run python scripts/quality_checkpoint.py ratchet \
            --baseline config/quality-baseline.json \
            --current output/quality/current.json

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-checkpoint
          if-no-files-found: warn
          path: output/quality/**

  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality-ratchet
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: financenews_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync Python environment
        run: uv sync --frozen --all-extras --dev

      - name: Run unit tests
        env:
          PYTHONPATH: src
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/financenews_test
        run: uv run pytest tests/unit -v --tb=short

      - name: Run integration tests
        env:
          PYTHONPATH: src
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/financenews_test
        run: uv run pytest tests/integration -v --tb=short -m integration

  frontend-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality-ratchet

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        continue-on-error: true  # 1157 pre-existing TS errors — fix incrementally
        run: bun run typecheck

      - name: ESLint
        run: bun run lint

      - name: Run frontend smoke suite
        env:
          FRONTEND_HOST: 127.0.0.1
          FRONTEND_PORT: 3100
          ENABLE_LOCAL_API_FALLBACK: true
        run: bun run smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-smoke-artifacts
          if-no-files-found: warn
          path: |
            .tmp/smoke/**
            output/playwright/smoke/**

  docker-build:
    runs-on: ubuntu-latest
    needs: [python-tests, frontend-smoke]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t financenews:ci .
