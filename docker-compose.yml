services:
  app:
    build: .
    container_name: financenews-app
    restart: unless-stopped
    ports:
      - "8000:8000"   # FastAPI
      - "3000:3000"   # Next.js
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/financenews
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=financenews
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - CONTINUOUS_INGEST_ENABLED=true
      - CONTINUOUS_INGEST_INTERVAL_SECONDS=300
    depends_on:
      postgres:
        condition: service_healthy
    command: python run_server.py

  postgres:
    image: postgres:16-alpine
    container_name: financenews-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=financenews
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financenews"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
