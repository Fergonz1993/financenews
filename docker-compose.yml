version: '3.8'

services:
  app:
    build: .
    container_name: financenews-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./briefings:/app/briefings
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - REDIS_HOST=redis
      - MONGO_URI=mongodb://mongo:27017/financenews
    depends_on:
      - redis
      - mongo
    command: python -m financial_news.cli run-api

  dashboard:
    build: .
    container_name: financenews-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./briefings:/app/briefings
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - REDIS_HOST=redis
      - MONGO_URI=mongodb://mongo:27017/financenews
    depends_on:
      - redis
      - mongo
      - app
    command: python -m financial_news.dashboard

  redis:
    image: redis:7-alpine
    container_name: financenews-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  mongo:
    image: mongo:6
    container_name: financenews-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=financenews

  scheduler:
    build: .
    container_name: financenews-scheduler
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./briefings:/app/briefings
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - REDIS_HOST=redis
      - MONGO_URI=mongodb://mongo:27017/financenews
    depends_on:
      - redis
      - mongo
    command: python -m financial_news.cli run-scheduler

volumes:
  redis-data:
  mongo-data:
